<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FrameArt</title>
<style>
  :root { --bg: #111; --surface: #1a1a1a; --border: #333; --text: #e0e0e0;
          --muted: #888; --accent: #6c8; --accent2: #4af; --err: #e55; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: var(--bg); color: var(--text); min-height: 100vh; }
  a { color: var(--accent2); }

  /* --- Layout --- */
  .header { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border); }
  .header h1 { font-size: 1.4rem; font-weight: 600; }
  .header h1 span { color: var(--accent); }
  .tabs { display: flex; gap: 0; }
  .tabs button { background: none; border: none; color: var(--muted); padding: .5rem 1rem;
                 cursor: pointer; font-size: .9rem; border-bottom: 2px solid transparent; }
  .tabs button.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tabs button:hover { color: var(--text); }
  .content { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* --- Forms --- */
  label { display: block; color: var(--muted); font-size: .8rem; margin-bottom: .25rem; }
  input, select, textarea { width: 100%; background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: .6rem .8rem;
    font-size: .95rem; margin-bottom: .8rem; }
  textarea { resize: vertical; min-height: 80px; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
  .row { display: flex; gap: 1rem; }
  .row > * { flex: 1; }
  .btn { display: inline-flex; align-items: center; gap: .5rem; background: var(--accent);
         color: #111; border: none; border-radius: 6px; padding: .7rem 1.4rem; font-size: .95rem;
         font-weight: 600; cursor: pointer; }
  .btn:hover { opacity: .85; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-secondary { background: var(--border); color: var(--text); }

  /* --- Status / results --- */
  .status-bar { margin-top: 1rem; padding: .8rem 1rem; border-radius: 6px;
                background: var(--surface); border: 1px solid var(--border); display: none; }
  .status-bar.visible { display: block; }
  .status-bar .label { font-size: .8rem; color: var(--muted); }
  .status-bar .value { font-size: .95rem; }
  .status-bar.error { border-color: var(--err); }
  .status-bar.error .value { color: var(--err); }
  .status-bar.done { border-color: var(--accent); }

  /* --- Gallery --- */
  .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
             gap: 1rem; }
  .gallery-item { background: var(--surface); border-radius: 8px; overflow: hidden;
                  border: 1px solid var(--border); cursor: pointer; }
  .gallery-item img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
  .gallery-item .info { padding: .6rem .8rem; }
  .gallery-item .info .prompt { font-size: .85rem; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .gallery-item .info .meta { font-size: .75rem; color: var(--muted); margin-top: .2rem; }

  /* --- TV cards --- */
  .tv-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
             padding: 1rem; margin-bottom: .8rem; display: flex; justify-content: space-between;
             align-items: center; }
  .tv-card .tv-info { }
  .tv-card .tv-name { font-weight: 600; }
  .tv-card .tv-detail { font-size: .85rem; color: var(--muted); margin-top: .2rem; }
  .badge { display: inline-block; padding: .15rem .5rem; border-radius: 4px; font-size: .75rem;
           font-weight: 600; }
  .badge-frame { background: rgba(102,204,136,.15); color: var(--accent); }
  .badge-samsung { background: rgba(68,170,255,.15); color: var(--accent2); }

  .empty { text-align: center; color: var(--muted); padding: 3rem 1rem; }

  /* --- Preview modal --- */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
                   z-index: 100; justify-content: center; align-items: center; }
  .modal-overlay.visible { display: flex; }
  .modal-overlay img { max-width: 95vw; max-height: 90vh; border-radius: 8px; }
</style>
</head>
<body>

<div class="header">
  <h1>Frame<span>Art</span></h1>
  <div class="tabs">
    <button class="active" data-tab="generate">Generate</button>
    <button data-tab="gallery">Gallery</button>
    <button data-tab="tvs">TVs</button>
  </div>
</div>

<!-- ===== Generate ===== -->
<div class="content">
<div class="panel active" id="panel-generate">
  <label for="prompt">Prompt</label>
  <textarea id="prompt" placeholder="A peaceful mountain lake at sunset, reflections in still water..."></textarea>

  <div class="row">
    <div>
      <label for="style">Style</label>
      <select id="style"><option value="">None</option></select>
    </div>
    <div>
      <label for="tv-select">Send to TV</label>
      <select id="tv-select"><option value="">Generate only (no TV)</option></select>
    </div>
  </div>

  <div class="row">
    <div>
      <label for="provider">Provider</label>
      <input id="provider" placeholder="e.g. openai (leave blank for default)">
    </div>
    <div>
      <label for="model">Model</label>
      <input id="model" placeholder="e.g. dall-e-3 (leave blank for default)">
    </div>
  </div>

  <button class="btn" id="btn-generate">Generate</button>

  <div class="status-bar" id="gen-status">
    <div class="label">Status</div>
    <div class="value" id="gen-status-text">...</div>
  </div>

  <div id="gen-preview" style="margin-top:1rem; display:none;">
    <img id="gen-preview-img" style="width:100%; border-radius:8px; aspect-ratio:16/9; object-fit:cover;">
  </div>
</div>

<!-- ===== Gallery ===== -->
<div class="panel" id="panel-gallery">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
    <h2 style="font-size:1.1rem;">Recent Artwork</h2>
    <button class="btn btn-secondary" id="btn-refresh-gallery">Refresh</button>
  </div>
  <div class="gallery" id="gallery-grid"></div>
  <div class="empty" id="gallery-empty" style="display:none;">No artwork generated yet.</div>
</div>

<!-- ===== TVs ===== -->
<div class="panel" id="panel-tvs">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
    <h2 style="font-size:1.1rem;">Discovered TVs</h2>
    <button class="btn btn-secondary" id="btn-discover">Scan Network</button>
  </div>
  <div id="tv-list"></div>
  <div class="empty" id="tv-empty">Click "Scan Network" to find Samsung TVs on your LAN.</div>
</div>
</div>

<!-- Preview modal -->
<div class="modal-overlay" id="modal">
  <img id="modal-img" src="">
</div>

<script>
(function() {
  // --- Tabs ---
  const tabs = document.querySelectorAll('.tabs button');
  const panels = document.querySelectorAll('.panel');
  tabs.forEach(btn => {
    btn.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      panels.forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
      if (btn.dataset.tab === 'gallery') loadGallery();
    });
  });

  // --- Load styles ---
  fetch('/styles').then(r => r.json()).then(styles => {
    const sel = document.getElementById('style');
    for (const [key, desc] of Object.entries(styles)) {
      const opt = document.createElement('option');
      opt.value = key; opt.textContent = key.replace(/_/g, ' ');
      sel.appendChild(opt);
    }
  }).catch(() => {});

  // --- Status helpers ---
  const statusBar = document.getElementById('gen-status');
  const statusText = document.getElementById('gen-status-text');
  function showStatus(msg, cls) {
    statusBar.className = 'status-bar visible' + (cls ? ' ' + cls : '');
    statusText.textContent = msg;
  }

  // --- Generate ---
  const btnGen = document.getElementById('btn-generate');
  btnGen.addEventListener('click', async () => {
    const prompt = document.getElementById('prompt').value.trim();
    if (!prompt) { showStatus('Please enter a prompt.', 'error'); return; }

    const style = document.getElementById('style').value || undefined;
    const provider = document.getElementById('provider').value.trim() || undefined;
    const model = document.getElementById('model').value.trim() || undefined;
    const tvIp = document.getElementById('tv-select').value || undefined;

    const useTV = !!tvIp;
    const endpoint = useTV ? '/async/generate-and-apply' : '/async/generate';
    const body = { prompt, style, provider, model };
    if (useTV) { body.tv_ip = tvIp; }

    btnGen.disabled = true;
    showStatus('Submitting job...');
    document.getElementById('gen-preview').style.display = 'none';

    try {
      const resp = await fetch(endpoint, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body),
      });
      if (!resp.ok) { throw new Error('Server returned ' + resp.status); }
      const data = await resp.json();
      pollJob(data.job_id);
    } catch (e) {
      showStatus('Failed: ' + e.message, 'error');
      btnGen.disabled = false;
    }
  });

  function pollJob(jobId) {
    showStatus('Job ' + jobId + ' — running...');
    const interval = setInterval(async () => {
      try {
        const resp = await fetch('/jobs/' + jobId + '/status');
        if (!resp.ok) { clearInterval(interval); showStatus('Lost track of job.', 'error'); btnGen.disabled = false; return; }
        const data = await resp.json();
        if (data.status === 'pending' || data.status === 'running') {
          showStatus('Job ' + jobId + ' — ' + data.status + '...');
          return;
        }
        clearInterval(interval);
        btnGen.disabled = false;
        if (data.status === 'completed' && data.result) {
          showStatus('Done! Job ' + data.result.job_id, 'done');
          const img = document.getElementById('gen-preview-img');
          img.src = '/jobs/' + data.result.job_id + '/image?' + Date.now();
          document.getElementById('gen-preview').style.display = 'block';
        } else {
          showStatus('Failed: ' + (data.error || 'unknown error'), 'error');
        }
      } catch (e) {
        clearInterval(interval);
        showStatus('Polling error: ' + e.message, 'error');
        btnGen.disabled = false;
      }
    }, 2000);
  }

  // --- Gallery ---
  async function loadGallery() {
    const grid = document.getElementById('gallery-grid');
    const empty = document.getElementById('gallery-empty');
    try {
      const resp = await fetch('/jobs?limit=50');
      const jobs = await resp.json();
      if (!jobs.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
      empty.style.display = 'none';
      grid.innerHTML = jobs.map(j => `
        <div class="gallery-item" onclick="showPreview('${j.job_id}')">
          <img src="/jobs/${j.job_id}/image" alt="${(j.prompt || '').substring(0,40)}" loading="lazy"
               onerror="this.style.display='none'">
          <div class="info">
            <div class="prompt">${j.prompt || j.job_id}</div>
            <div class="meta">${j.provider || ''} ${j.content_id ? '&middot; on TV' : ''}</div>
          </div>
        </div>
      `).join('');
    } catch (e) { grid.innerHTML = '<div class="empty">Failed to load gallery.</div>'; }
  }

  window.showPreview = function(jobId) {
    const modal = document.getElementById('modal');
    document.getElementById('modal-img').src = '/jobs/' + jobId + '/image';
    modal.classList.add('visible');
  };
  document.getElementById('modal').addEventListener('click', function() {
    this.classList.remove('visible');
  });

  // --- TV Discovery ---
  const btnDiscover = document.getElementById('btn-discover');
  btnDiscover.addEventListener('click', async () => {
    const list = document.getElementById('tv-list');
    const empty = document.getElementById('tv-empty');
    btnDiscover.disabled = true;
    list.innerHTML = '<div class="empty">Scanning...</div>';
    empty.style.display = 'none';

    try {
      const resp = await fetch('/tv/discover?timeout=4');
      const tvs = await resp.json();
      btnDiscover.disabled = false;
      if (!tvs.length) { list.innerHTML = ''; empty.textContent = 'No Samsung TVs found.'; empty.style.display = 'block'; return; }

      // Populate TV select in Generate tab
      const tvSel = document.getElementById('tv-select');
      tvSel.innerHTML = '<option value="">Generate only (no TV)</option>';
      tvs.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t.ip; opt.textContent = t.name + ' (' + t.ip + ')' + (t.frame_tv ? ' [Frame]' : '');
        tvSel.appendChild(opt);
      });

      list.innerHTML = tvs.map(t => `
        <div class="tv-card">
          <div class="tv-info">
            <div class="tv-name">${t.name}</div>
            <div class="tv-detail">${t.model} &middot; ${t.ip}</div>
          </div>
          <span class="badge ${t.frame_tv ? 'badge-frame' : 'badge-samsung'}">
            ${t.frame_tv ? 'Frame TV' : 'Samsung TV'}
          </span>
        </div>
      `).join('');
    } catch (e) {
      btnDiscover.disabled = false;
      list.innerHTML = '<div class="empty">Discovery failed: ' + e.message + '</div>';
    }
  });
})();
</script>
</body>
</html>
