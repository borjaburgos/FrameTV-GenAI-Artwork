<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FrameArt</title>
<style>
  :root {
    --bg: #090c12;
    --bg-2: #0f141f;
    --surface: #161d2a;
    --surface-soft: #1b2435;
    --border: #2a3346;
    --text: #ecf1ff;
    --muted: #a8b3c8;
    --accent: #5fda96;
    --accent2: #57a6ff;
    --err: #f0616e;
    --warn: #f0bf5a;
    --surface2: #202a3c;
    --shadow: 0 20px 40px rgba(0, 0, 0, .32);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Avenir Next", "Avenir", "Segoe UI", "Helvetica Neue", sans-serif;
    background:
      radial-gradient(1200px 500px at 0% -20%, rgba(87, 166, 255, .15), transparent 60%),
      radial-gradient(1200px 500px at 100% -15%, rgba(95, 218, 150, .12), transparent 58%),
      linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 44%, #070a10 100%);
    color: var(--text);
    min-height: 100vh;
  }
  a { color: var(--accent2); }

  /* --- Layout --- */
  .header {
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: rgba(9, 12, 18, .82);
    backdrop-filter: blur(8px);
  }
  .header h1 { font-size: 1.4rem; font-weight: 600; }
  .header h1 span { color: var(--accent); }
  .tabs { display: flex; gap: 0; }
  .tabs button {
    background: transparent;
    border: 1px solid transparent;
    color: var(--muted);
    padding: .55rem 1rem;
    cursor: pointer;
    font-size: .94rem;
    border-radius: 999px;
    transition: border-color .18s ease, color .18s ease, background .18s ease;
  }
  .tabs button.active {
    color: var(--text);
    border-color: rgba(95, 218, 150, .45);
    background: rgba(95, 218, 150, .1);
  }
  .tabs button:hover { color: var(--text); border-color: rgba(87, 166, 255, .28); }
  .content { max-width: 1180px; margin: 0 auto; padding: 1.6rem 1.5rem 2rem; }
  .panel { display: none; }
  .panel.active { display: block; animation: fadeUp .24s ease; }

  /* --- Forms --- */
  label { display: block; color: var(--muted); font-size: .8rem; margin-bottom: .25rem; }
  input, select, textarea {
    width: 100%;
    background: rgba(20, 27, 39, .92);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: .64rem .82rem;
    font-size: .95rem;
    margin-bottom: .8rem;
    transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
  }
  textarea { resize: vertical; min-height: 80px; }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: rgba(87, 166, 255, .9);
    box-shadow: 0 0 0 3px rgba(87, 166, 255, .2);
    background: rgba(21, 30, 45, .98);
  }
  .row { display: flex; gap: 1rem; }
  .row > * { flex: 1; }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: .5rem;
    background: linear-gradient(120deg, #5fda96 0%, #60d6be 100%);
    color: #08110e;
    border: 1px solid rgba(95, 218, 150, .2);
    border-radius: 11px;
    padding: .68rem 1.3rem;
    font-size: .95rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform .16s ease, filter .16s ease, box-shadow .16s ease;
    box-shadow: 0 8px 18px rgba(95, 218, 150, .18);
  }
  .btn:hover {
    filter: brightness(1.03);
    transform: translateY(-1px);
    box-shadow: 0 12px 20px rgba(95, 218, 150, .2);
  }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn.busy { cursor: progress; }
  .btn-spinner {
    width: .82rem;
    height: .82rem;
    border-radius: 50%;
    border: 2px solid rgba(8, 17, 14, .24);
    border-top-color: currentColor;
    animation: spin .72s linear infinite;
    flex: 0 0 auto;
  }
  .btn-secondary {
    background: linear-gradient(180deg, #323c4f 0%, #2c3445 100%);
    color: var(--text);
    border-color: rgba(168, 179, 200, .2);
    box-shadow: none;
  }
  .btn-small { padding: .4rem .8rem; font-size: .8rem; }
  .btn-danger {
    background: linear-gradient(130deg, #cf4652 0%, #b53843 100%);
    color: #fff;
    border-color: rgba(255, 255, 255, .08);
    box-shadow: none;
  }

  /* --- Status / results --- */
  .status-bar {
    margin-top: 1rem;
    padding: .8rem 1rem;
    border-radius: 10px;
    background: rgba(22, 29, 42, .9);
    border: 1px solid var(--border);
    display: none;
  }
  .status-bar.visible { display: block; }
  .status-bar .label { font-size: .8rem; color: var(--muted); }
  .status-bar .value { font-size: .95rem; }
  .status-bar.error { border-color: var(--err); }
  .status-bar.error .value { color: var(--err); }
  .status-bar.done { border-color: var(--accent); }

  /* --- Gallery --- */
  .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
             gap: 1rem; }
  .gallery-item {
    background: linear-gradient(180deg, rgba(28, 36, 52, .92) 0%, rgba(21, 28, 40, .95) 100%);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    transition: transform .22s ease, border-color .22s ease;
  }
  .gallery-item:hover { transform: translateY(-3px); border-color: rgba(87, 166, 255, .5); }
  .gallery-item.selected { border-color: var(--accent2); box-shadow: 0 0 0 1px rgba(68,170,255,.35) inset; }
  .gallery-item img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block;
                      cursor: pointer; }
  .gallery-item .info { padding: .6rem .8rem; }
  .gallery-item .info .prompt { font-size: .85rem; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .gallery-item .info .meta { font-size: .75rem; color: var(--muted); margin-top: .2rem; }
  .gallery-item .actions { padding: 0 .8rem .6rem; display: flex; gap: .5rem; flex-wrap: wrap; }
  .gallery-item .select-row { display: flex; align-items: center; gap: .5rem; margin-bottom: .4rem; }
  .gallery-item .select-row input[type="checkbox"] { width: auto; margin: 0; }

  /* --- TV cards --- */
  .tv-card {
    background: linear-gradient(90deg, rgba(28, 37, 54, .95), rgba(21, 27, 39, .95));
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    margin-bottom: .8rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: var(--shadow);
    transition: border-color .2s ease, transform .2s ease;
  }
  .tv-card:hover { border-color: rgba(87, 166, 255, .45); transform: translateY(-2px); }
  .tv-card .tv-info { }
  .tv-card .tv-name { font-weight: 600; }
  .tv-card .tv-detail { font-size: .85rem; color: var(--muted); margin-top: .2rem; }
  .badge { display: inline-block; padding: .15rem .5rem; border-radius: 4px; font-size: .75rem;
           font-weight: 600; }
  .badge-frame { background: rgba(102,204,136,.15); color: var(--accent); }
  .badge-samsung { background: rgba(68,170,255,.15); color: var(--accent2); }
  .badge-config { background: rgba(168,179,200,.15); color: var(--muted); }

  .empty { text-align: center; color: var(--muted); padding: 3rem 1rem; }

  /* --- TV Art grid --- */
  .tv-art-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                 gap: .8rem; margin-top: 1rem; }
  .tv-art-item {
    background: linear-gradient(180deg, rgba(28, 37, 54, .95), rgba(20, 27, 39, .95));
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: .8rem;
    display: flex;
    flex-direction: column;
    gap: .5rem;
    box-shadow: var(--shadow);
    transition: transform .22s ease, border-color .22s ease;
  }
  .tv-art-item:hover { transform: translateY(-2px); border-color: rgba(87, 166, 255, .46); }
  .tv-art-item.selected { border-color: var(--accent2); box-shadow: 0 0 0 1px rgba(68,170,255,.35) inset; }
  .tv-art-item .art-select-row { display: flex; align-items: center; gap: .5rem; }
  .tv-art-item .art-select-row input[type="checkbox"] { width: auto; margin: 0; }
  .tv-art-item .art-thumb-wrap { width: 100%; aspect-ratio: 16/9; border-radius: 6px;
                                 overflow: hidden; background: #121212; border: 1px solid var(--border);
                                 position: relative; }
  .tv-art-item .art-thumb { width: 100%; height: 100%; object-fit: cover; display: block; }
  .tv-art-item .art-thumb-fallback { position: absolute; inset: 0; display: none; align-items: center;
                                     justify-content: center; color: var(--muted); font-size: .8rem; }
  .tv-art-item .art-id { font-family: monospace; font-size: .85rem; }
  .tv-art-item .art-fav { color: var(--warn); font-size: .8rem; }
  .tv-art-item .art-actions { display: flex; gap: .4rem; flex-wrap: wrap; }

  /* --- Matte modal --- */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(3, 6, 10, .82);
    z-index: 100;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: opacity .2s ease, visibility .2s ease;
  }
  .modal-overlay.visible {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
  }
  .modal-overlay img,
  .modal-overlay .modal-dialog {
    transform: translateY(10px) scale(.98);
    opacity: .96;
    transition: transform .22s ease, opacity .22s ease;
  }
  .modal-overlay.visible img,
  .modal-overlay.visible .modal-dialog {
    transform: translateY(0) scale(1);
    opacity: 1;
  }
  .modal-overlay img { max-width: 95vw; max-height: 90vh; border-radius: 8px; }
  .modal-dialog { background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
                  padding: 1.5rem; min-width: 320px; max-width: 90vw; }
  .modal-dialog h3 { margin-bottom: 1rem; font-size: 1.1rem; }
  .modal-dialog .modal-actions { display: flex; gap: .5rem; justify-content: flex-end;
                                 margin-top: 1rem; }

  /* --- Section heading --- */
  .section-heading { display: flex; justify-content: space-between; align-items: center;
                     margin-bottom: 1rem; }
  .section-heading h2 {
    font-size: 1.35rem;
    letter-spacing: .2px;
    text-wrap: balance;
  }
  .section-heading .btn-group { display: flex; gap: .5rem; }

  /* --- TV Art section within TVs tab --- */
  .tv-art-section { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }

  /* --- Skeleton loading --- */
  .skeleton-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
                   overflow: hidden; }
  .skeleton-card .sk-thumb { width: 100%; aspect-ratio: 16/9; background: linear-gradient(90deg, #181818, #262626, #181818);
                              background-size: 200% 100%; animation: sk 1.1s infinite linear; }
  .skeleton-card .sk-line { height: 12px; margin: 10px 12px; border-radius: 6px; background: #252525; }
  .skeleton-card .sk-line.short { width: 45%; }
  @keyframes sk {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* --- Toasts --- */
  .toast-wrap { position: fixed; right: 14px; bottom: 14px; z-index: 300; display: flex;
                flex-direction: column; gap: 8px; max-width: min(440px, calc(100vw - 24px)); }
  .toast {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent2);
    border-radius: 10px;
    padding: .65rem .8rem;
    box-shadow: 0 8px 24px rgba(0,0,0,.35);
    animation: fadeUp .2s ease;
  }
  .toast.error { border-left-color: var(--err); }
  .toast.done { border-left-color: var(--accent); }
  .toast.warn { border-left-color: var(--warn); }

  :focus-visible { outline: 2px solid var(--accent2); outline-offset: 2px; border-radius: 6px; }

  .reveal-stagger {
    opacity: 0;
    transform: translateY(6px);
    animation: fadeUp .26s ease forwards;
  }

  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin {
    0% { transform: rotate(0); }
    100% { transform: rotate(360deg); }
  }

  @media (max-width: 920px) {
    .header { flex-wrap: wrap; gap: .8rem; }
    .row { flex-direction: column; gap: .6rem; }
    .section-heading { flex-direction: column; align-items: flex-start; gap: .6rem; }
    .section-heading .btn-group { flex-wrap: wrap; }
    .content { padding: 1.1rem .9rem 1.5rem; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Frame<span>Art</span></h1>
  <div class="tabs">
    <button class="active" data-tab="generate">Generate</button>
    <button data-tab="gallery">Gallery</button>
    <button data-tab="public">Public Domain</button>
    <button data-tab="tvs">TVs</button>
  </div>
</div>

<!-- ===== Generate ===== -->
<div class="content">
<div class="panel active" id="panel-generate">
  <label for="prompt">Prompt</label>
  <textarea id="prompt" placeholder="A peaceful mountain lake at sunset, reflections in still water..."></textarea>

  <div class="row">
    <div>
      <label for="style">Style</label>
      <select id="style"><option value="">None</option></select>
    </div>
    <div>
      <label for="tv-select">Send to TV</label>
      <select id="tv-select"><option value="">Generate only (no TV)</option></select>
    </div>
  </div>

  <div class="row">
    <div>
      <label for="provider">Provider</label>
      <input id="provider" placeholder="e.g. openai (leave blank for default)">
    </div>
    <div>
      <label for="model">Model</label>
      <input id="model" placeholder="e.g. dall-e-3 (leave blank for default)">
    </div>
  </div>

  <button class="btn" id="btn-generate">Generate</button>

  <div class="status-bar" id="gen-status">
    <div class="label">Status</div>
    <div class="value" id="gen-status-text">...</div>
  </div>

  <div id="gen-preview" style="margin-top:1rem; display:none;">
    <img id="gen-preview-img" style="width:100%; border-radius:8px; aspect-ratio:16/9; object-fit:cover;">
  </div>
</div>

<!-- ===== Gallery ===== -->
<div class="panel" id="panel-gallery">
  <div class="section-heading">
    <h2>Recent Artwork</h2>
    <div class="btn-group">
      <button class="btn btn-secondary" id="btn-refresh-gallery">Refresh</button>
      <button class="btn btn-secondary" id="btn-gallery-select-all">Select All</button>
      <button class="btn btn-secondary" id="btn-gallery-clear-selection">Clear</button>
      <button class="btn btn-danger" id="btn-gallery-delete-selected" disabled>Delete Selected</button>
    </div>
  </div>
  <div class="gallery" id="gallery-grid"></div>
  <div class="empty" id="gallery-empty" style="display:none;">No artwork generated yet.</div>
</div>

<!-- ===== Public Domain ===== -->
<div class="panel" id="panel-public">
  <div class="section-heading">
    <h2>Public Domain Artwork</h2>
  </div>
  <div class="row">
    <div>
      <label for="public-source">Source</label>
      <select id="public-source">
        <option value="met">The Met</option>
        <option value="aic">Art Institute of Chicago</option>
        <option value="cma">Cleveland Museum of Art</option>
        <option value="europeana">Europeana</option>
      </select>
    </div>
    <div>
      <label for="public-query">Search</label>
      <input id="public-query" placeholder="e.g. monet, landscape, ukiyo-e">
    </div>
    <div style="align-self:end;">
      <button class="btn btn-secondary" id="btn-public-search">Search</button>
    </div>
  </div>
  <div class="row">
    <div>
      <label for="public-tv-select">Display on TV</label>
      <select id="public-tv-select"></select>
    </div>
    <div>
      <label for="public-matte-select">Matte Style</label>
      <select id="public-matte-select">
        <option value="none">none</option>
        <option value="shadowbox_polar">shadowbox_polar</option>
      </select>
    </div>
  </div>
  <div class="status-bar" id="public-status">
    <div class="value" id="public-status-text"></div>
  </div>
  <div class="gallery" id="public-grid"></div>
  <div class="empty" id="public-empty">Search public-domain catalogs to display art on your TV.</div>
</div>

<!-- ===== TVs ===== -->
<div class="panel" id="panel-tvs">
  <div class="section-heading">
    <h2>TVs</h2>
    <button class="btn btn-secondary" id="btn-discover">Scan Network</button>
  </div>
  <div id="tv-list"></div>
  <div class="empty" id="tv-empty">Loading configured TVs...</div>

  <!-- TV Art sub-section -->
  <div class="tv-art-section" id="tv-art-section" style="display:none;">
    <div class="section-heading">
      <h2>Art on TV</h2>
      <div class="btn-group">
        <select id="tv-art-select" style="width:auto; margin-bottom:0;"></select>
        <button class="btn btn-secondary btn-small" id="btn-load-art">Load Art</button>
        <button class="btn btn-danger btn-small" id="btn-delete-selected" disabled>Delete Selected</button>
      </div>
    </div>
    <div class="tv-art-grid" id="tv-art-grid"></div>
    <div class="empty" id="tv-art-empty" style="display:none;">Select a TV and click "Load Art".</div>
  </div>
</div>
</div>

<!-- Preview modal (for gallery images) -->
<div class="modal-overlay" id="modal">
  <img id="modal-img" src="">
</div>

<!-- Matte modal -->
<div class="modal-overlay" id="matte-modal">
  <div class="modal-dialog">
    <h3>Change Matte</h3>
    <p style="font-size:.85rem; color:var(--muted); margin-bottom:.8rem;">
      Artwork: <strong id="matte-content-id"></strong>
    </p>
    <label for="matte-select">Matte Style</label>
    <select id="matte-select"><option value="">Loading...</option></select>
    <div class="modal-actions">
      <button class="btn btn-secondary btn-small" id="btn-matte-cancel">Cancel</button>
      <button class="btn btn-small" id="btn-matte-apply">Apply</button>
    </div>
  </div>
</div>

<!-- Upload-to-TV modal (for gallery items) -->
<div class="modal-overlay" id="upload-modal">
  <div class="modal-dialog">
    <h3>Upload to TV</h3>
    <p style="font-size:.85rem; color:var(--muted); margin-bottom:.8rem;">
      Job: <strong id="upload-job-id"></strong>
    </p>
    <label for="upload-tv-select">TV</label>
    <select id="upload-tv-select"></select>
    <label for="upload-matte-select">Matte Style</label>
    <select id="upload-matte-select">
      <option value="none">none (default)</option>
      <option value="shadowbox_polar">shadowbox_polar</option>
    </select>
    <div class="modal-actions">
      <button class="btn btn-secondary btn-small" id="btn-upload-cancel">Cancel</button>
      <button class="btn btn-small" id="btn-upload-apply">Upload</button>
    </div>
    <div class="status-bar" id="upload-status" style="margin-top:.8rem;">
      <div class="value" id="upload-status-text"></div>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toast-wrap" aria-live="polite"></div>

<script>
(function() {
  // =========================================================================
  // State: known TVs (merged from configured + discovered)
  // =========================================================================
  // Each entry: { ip, name, source ('config'|'discovered'), model?, frame_tv? }
  let knownTVs = [];
  let selectedTVArtIds = new Set();
  let loadedTVArtById = {};
  let selectedGalleryJobIds = new Set();
  const storageKeys = {
    tvGenerate: 'frameart.tv.generate',
    tvPublic: 'frameart.tv.public',
    tvUpload: 'frameart.tv.upload',
    tvArt: 'frameart.tv.art',
    mattePublic: 'frameart.matte.public',
    matteUpload: 'frameart.matte.upload',
  };

  function showToast(message, kind) {
    const wrap = document.getElementById('toast-wrap');
    if (!wrap) return;
    const toast = document.createElement('div');
    toast.className = 'toast' + (kind ? ' ' + kind : '');
    toast.textContent = message;
    wrap.appendChild(toast);
    setTimeout(() => toast.remove(), 3600);
  }

  function animateStaggeredChildren(container, selector) {
    if (!container) return;
    const nodes = container.querySelectorAll(selector);
    nodes.forEach((node, index) => {
      node.classList.add('reveal-stagger');
      node.style.animationDelay = (index * 22) + 'ms';
    });
  }

  function setButtonBusy(btn, busyText) {
    if (!btn) return;
    btn.dataset.originalHtml = btn.innerHTML;
    btn.dataset.originalText = btn.textContent;
    btn.disabled = true;
    btn.classList.add('busy');
    btn.setAttribute('aria-busy', 'true');
    const label = busyText || btn.dataset.originalText || 'Working...';
    btn.innerHTML = '<span class="btn-spinner" aria-hidden="true"></span><span>' + esc(label) + '</span>';
  }

  function clearButtonBusy(btn) {
    if (!btn) return;
    btn.disabled = false;
    btn.classList.remove('busy');
    btn.removeAttribute('aria-busy');
    if (btn.dataset.originalHtml) btn.innerHTML = btn.dataset.originalHtml;
  }

  function addTVs(tvs, source) {
    for (const tv of tvs) {
      if (!knownTVs.some(k => k.ip === tv.ip)) {
        knownTVs.push({ ...tv, source });
      }
    }
    refreshTVSelects();
    renderTVList();
  }

  function refreshTVSelects() {
    // Update all TV <select> elements throughout the UI
    const selectors = ['tv-select', 'tv-art-select', 'upload-tv-select', 'public-tv-select'];
    for (const id of selectors) {
      const sel = document.getElementById(id);
      if (!sel) continue;
      const prev = sel.value;
      if (id === 'tv-select') {
        sel.innerHTML = '<option value="">Generate only (no TV)</option>';
      } else if (id === 'public-tv-select') {
        sel.innerHTML = '<option value="">Select TV...</option>';
      } else {
        sel.innerHTML = '';
      }
      for (const tv of knownTVs) {
        const opt = document.createElement('option');
        opt.value = tv.ip;
        const label = tv.name + ' (' + tv.ip + ')';
        opt.textContent = label;
        sel.appendChild(opt);
      }
      // Restore previous selection if still valid

          id === 'tv-select' ? storageKeys.tvGenerate :
          id === 'public-tv-select' ? storageKeys.tvPublic :
          id === 'upload-tv-select' ? storageKeys.tvUpload :
          storageKeys.tvArt

          sel.value = remembered;

  const btnGen = document.getElementById('btn-generate');
  btnGen.addEventListener('click', async () => {
    const prompt = document.getElementById('prompt').value.trim();
    if (!prompt) { showStatus('Please enter a prompt.', 'error'); return; }

    const style = document.getElementById('style').value || undefined;
    const provider = document.getElementById('provider').value.trim() || undefined;
    const model = document.getElementById('model').value.trim() || undefined;
    const tvIp = document.getElementById('tv-select').value || undefined;

    const useTV = !!tvIp;
    const endpoint = useTV ? '/async/generate-and-apply' : '/async/generate';
    const body = { prompt, style, provider, model };

    document.getElementById('gen-preview').style.display = 'none';

        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body),
      });
      if (!resp.ok) { throw new Error('Server returned ' + resp.status); }
      const data = await resp.json();
      pollJob(data.job_id);
    } catch (e) {
      showStatus('Failed: ' + e.message, 'error');
      clearButtonBusy(btnGen);
    }
  });

  function pollJob(jobId) {
    showStatus('Job ' + jobId + ' \u2014 running...');
    const interval = setInterval(async () => {
      try {
        const resp = await fetch('/jobs/' + jobId + '/status');
        if (!resp.ok) { clearInterval(interval); showStatus('Lost track of job.', 'error'); btnGen.disabled = false; return; }
        const data = await resp.json();
        if (data.status === 'pending' || data.status === 'running') {
          showStatus('Job ' + jobId + ' \u2014 ' + data.status + '...');
          return;
        }
        clearInterval(interval);
        clearButtonBusy(btnGen);
        if (data.status === 'completed' && data.result) {
          showStatus('Done! Job ' + data.result.job_id, 'done');
          const img = document.getElementById('gen-preview-img');
          img.src = '/jobs/' + data.result.job_id + '/image?' + Date.now();
          document.getElementById('gen-preview').style.display = 'block';
        } else {
          showStatus('Failed: ' + (data.error || 'unknown error'), 'error');
        }
      } catch (e) {
        clearInterval(interval);
        showStatus('Polling error: ' + e.message, 'error');
        clearButtonBusy(btnGen);
      }
    }, 2000);
  }

  async function deleteSelectedGalleryJobs() {
    const selectedIds = Array.from(selectedGalleryJobIds);
    if (!selectedIds.length) return;

    if (!confirm('Delete ' + selectedIds.length + ' selected artwork item(s) from host storage?')) return;

    const btn = document.getElementById('btn-gallery-delete-selected');
    setButtonBusy(btn, 'Deleting...');

    try {
      const resp = await fetch('/jobs/delete', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ job_ids: selectedIds }),
      });
      if (!resp.ok) throw new Error('Server returned ' + resp.status);
      const data = await resp.json();
      if (data.failed && Object.keys(data.failed).length) {
        showToast('Some items failed to delete: ' + Object.keys(data.failed).join(', '), 'warn');
      }
      if (data.not_found && data.not_found.length) {
        showToast('Some items were not found: ' + data.not_found.join(', '), 'warn');
      }
      selectedGalleryJobIds = new Set();
      updateDeleteGalleryButton();
      await loadGallery();
      showToast('Deleted selected gallery items.', 'done');
    } catch (e) {
      showToast('Failed to delete selected artwork: ' + e.message, 'error');
      updateDeleteGalleryButton();
    } finally {
      clearButtonBusy(btn);

  async function readApiError(resp, fallbackPrefix) {
    const contentType = resp.headers.get('content-type') || '';
    if (contentType.includes('application/json')) {
      const err = await resp.json().catch(() => ({}));
      if (typeof err?.detail === 'string') return err.detail;
      if (err?.detail && typeof err.detail === 'object') return JSON.stringify(err.detail);
      if (typeof err?.error === 'string') return err.error;
    }
    const text = await resp.text().catch(() => '');
    const trimmed = (text || '').trim();
    if (trimmed) return trimmed.slice(0, 300);
    return fallbackPrefix + ' ' + resp.status;
  }

  function renderPublicResults(items) {
    const grid = document.getElementById('public-grid');
    const empty = document.getElementById('public-empty');

    if (!items.length) {
      grid.innerHTML = '';
      empty.textContent = 'No public-domain results found for this query.';
      empty.style.display = 'block';
      return;

    empty.style.display = 'none';
    grid.innerHTML = items.map(item => {
      const title = esc(item.title || (item.source + ' ' + item.artwork_id));
      const artist = esc(item.artist || 'Unknown artist');
      const date = esc(item.date || '');
      const meta = date ? (artist + ' · ' + date) : artist;
      const thumb = esc(item.thumbnail_url || item.image_url || '');
      const link = esc(item.source_url || '#');
      return `
        <div class="gallery-item">
          <img src="${thumb}" alt="${title}" loading="lazy" onerror="this.style.display='none'">
          <div class="info">
            <div class="prompt">${title}</div>

              Source</a>
          </div>
        </div>
      `;
    }).join('');
    animateStaggeredChildren(grid, '.gallery-item');

    grid.querySelectorAll('.btn-pd-display').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        const source = e.currentTarget.dataset.source;
        const artworkId = e.currentTarget.dataset.id;
        await applyPublicArtwork(source, artworkId, e.currentTarget);

  async function searchPublicDomain() {
    const searchBtn = document.getElementById('btn-public-search');
    const source = document.getElementById('public-source').value;
    const q = document.getElementById('public-query').value.trim();
    const grid = document.getElementById('public-grid');
    const empty = document.getElementById('public-empty');

    if (!q) {
      showPublicStatus('Enter search text first.', 'error');
      return;
    }

    showPublicStatus('Searching ' + source.toUpperCase() + '...', '');
    setButtonBusy(searchBtn, 'Searching...');
    grid.innerHTML = '<div class="empty">Searching...</div>';
    empty.style.display = 'none';

    try {
      const resp = await fetch(
        '/catalog/search?source=' + encodeURIComponent(source) +
        '&q=' + encodeURIComponent(q) + '&limit=20'
      );
      if (!resp.ok) {
        const detail = await readApiError(resp, 'Server returned');
        throw new Error(detail);
      }
      const items = await resp.json();
      renderPublicResults(items);
      showPublicStatus('Found ' + items.length + ' result(s).', items.length ? 'done' : '');
      if (items.length) showToast('Public results updated (' + items.length + ').', 'done');
    } catch (e) {
      grid.innerHTML = '';
      empty.textContent = 'Search failed.';
      empty.style.display = 'block';
      showPublicStatus('Search failed: ' + e.message, 'error');
      showToast('Public search failed: ' + e.message, 'error');
    } finally {
      clearButtonBusy(searchBtn);
    }
  }

          source: source,
          artwork_id: artworkId,
          tv_ip: tvIp,
          matte: matte,

      });
      if (!resp.ok) {
        const detail = await readApiError(resp, 'Server returned');
        throw new Error(detail);

      const data = await resp.json();
      showPublicStatus('Displayed on TV. Job ' + data.job_id, 'done');

        empty.textContent = 'No artwork on this TV.';
        empty.style.display = 'block';
        return;
      }

      loadedTVArtById = Object.fromEntries(artworks.map(a => [a.content_id, a]));

      grid.innerHTML = artworks.map(a => `
        <div class="tv-art-item">
          <label class="art-select-row">
            <input type="checkbox" class="tv-art-select-item" data-content-id="${esc(a.content_id)}">
            <span class="art-id">${esc(a.content_id)}</span>
            ${a.is_favourite ? '<span class="art-fav">\u2665 favourite</span>' : ''}
          </label>
          <div class="art-thumb-wrap">
            <img class="art-thumb"
                 src="/tv/art/thumbnail?tv_ip=${encodeURIComponent(tvIp)}&content_id=${encodeURIComponent(a.content_id)}"
                 alt="Thumbnail ${esc(a.content_id)}"
                 loading="lazy"
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="art-thumb-fallback">No thumbnail</div>
          </div>
          <div class="art-actions">
            <button class="btn btn-small"
                    onclick="displayTVArt('${esc(a.content_id)}', '${esc(tvIp)}', this)">
              Display on TV</button>
            <button class="btn btn-secondary btn-small"
                    onclick="openMatteModal('${esc(a.content_id)}', '${esc(tvIp)}')">
              Change Matte</button>
            <button class="btn btn-danger btn-small"
                    onclick="deleteTVArt('${esc(a.content_id)}', '${esc(tvIp)}', ${a.is_favourite})">
              Delete</button>
          </div>
        </div>
      `).join('');
      animateStaggeredChildren(grid, '.tv-art-item');

      grid.querySelectorAll('.tv-art-select-item').forEach(el => {
        el.addEventListener('change', (e) => {
          const checkbox = e.target;
          const card = checkbox.closest('.tv-art-item');
          const cid = checkbox.dataset.contentId;
          if (!cid) return;
          if (checkbox.checked) {
            selectedTVArtIds.add(cid);
          } else {
            selectedTVArtIds.delete(cid);
          }
          if (card) card.classList.toggle('selected', checkbox.checked);
          updateDeleteSelectedButton();
        });
      });
    } catch (e) {
      grid.innerHTML = '<div class="empty">Failed to load art: ' + esc(e.message) + '</div>';
      showToast('Failed to load TV art: ' + e.message, 'error');
    }
  }

  // =========================================================================
  // Display Existing TV Art
  // =========================================================================
  window.displayTVArt = async function(contentId, tvIp, btn) {
    setButtonBusy(btn, 'Displaying...');
    try {
      const resp = await fetch('/tv/art/display', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          content_id: contentId,
          tv_ip: tvIp,
        }),
      });
      if (!resp.ok) throw new Error('Server returned ' + resp.status);
      showToast('TV switched to ' + contentId + '.', 'done');
    } catch (e) {
      showToast('Failed to display artwork: ' + e.message, 'error');
    } finally {
      clearButtonBusy(btn);
    }
  };

  // =========================================================================
  // Delete TV Art
  // =========================================================================
  window.deleteTVArt = async function(contentId, tvIp, isFav) {
    const msg = isFav
      ? 'This artwork is favourited. Delete anyway? (content: ' + contentId + ')'
      : 'Delete artwork ' + contentId + ' from TV?';
    if (!confirm(msg)) return;

    try {
      const resp = await fetch('/tv/art/delete', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          content_ids: [contentId],
          tv_ip: tvIp,
          include_favorites: isFav,
        }),
      });
      if (!resp.ok) throw new Error('Server returned ' + resp.status);
      const data = await resp.json();
      if (data.deleted.length) {
        loadTVArt(); // Refresh the list
        showToast('Artwork deleted from TV.', 'done');
      } else if (data.skipped_favorites.length) {
        showToast('Artwork was skipped because it is a favourite.', 'warn');
      }
    } catch (e) {
      showToast('Failed to delete: ' + e.message, 'error');
    }
  };

  async function deleteSelectedTVArt() {
    const tvIp = document.getElementById('tv-art-select').value;
    const selectedIds = Array.from(selectedTVArtIds);
    if (!tvIp || !selectedIds.length) return;

    const favCount = selectedIds.filter(cid => loadedTVArtById[cid]?.is_favourite).length;
    const msg = favCount
      ? ('Delete ' + selectedIds.length + ' selected artworks? This includes ' + favCount + ' favourite(s).')
      : ('Delete ' + selectedIds.length + ' selected artworks from TV?');
    if (!confirm(msg)) return;

    const btn = document.getElementById('btn-delete-selected');
    setButtonBusy(btn, 'Deleting...');

    try {
      const resp = await fetch('/tv/art/delete', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          content_ids: selectedIds,
          tv_ip: tvIp,
          include_favorites: favCount > 0,
        }),
      });
      if (!resp.ok) throw new Error('Server returned ' + resp.status);
      const data = await resp.json();
      if (data.deleted.length) {
        await loadTVArt();
        showToast('Deleted selected artwork from TV.', 'done');
      }
      if (data.skipped_favorites.length) {
        showToast('Some favourites were skipped: ' + data.skipped_favorites.join(', '), 'warn');
      }
    } catch (e) {
      showToast('Failed to delete selected artwork: ' + e.message, 'error');
    } finally {
      clearButtonBusy(btn);
      updateDeleteSelectedButton();
    }
  }

  // =========================================================================
  // Change Matte modal
  // =========================================================================
  let matteContentId = null;
  let matteTvIp = null;

  window.openMatteModal = async function(contentId, tvIp) {
    matteContentId = contentId;
    matteTvIp = tvIp;
    document.getElementById('matte-content-id').textContent = contentId;
    openModal('matte-modal', '#matte-select');

    loadMattesForSelect('matte-select', tvIp);
  };

  async function loadMattesForSelect(selectId, tvIp) {
    const sel = document.getElementById(selectId);
    if (!tvIp) return;

    sel.innerHTML = '<option value="">Loading...</option>';
    try {
      const resp = await fetch('/tv/mattes?tv_ip=' + encodeURIComponent(tvIp));
      if (!resp.ok) throw new Error('Failed to load');
      const mattes = await resp.json();
      sel.innerHTML = '';
      if (!mattes.length) {
        sel.innerHTML = '<option value="none">none</option>' +
                        '<option value="shadowbox_polar">shadowbox_polar</option>';
        return;
      }
      for (const m of mattes) {
        const id = m.matte_id || m;
        const opt = document.createElement('option');
        opt.value = id;
        opt.textContent = id;
        sel.appendChild(opt);
      }
      const remembered = localStorage.getItem(
        selectId === 'public-matte-select' ? storageKeys.mattePublic : storageKeys.matteUpload
      );
      if (remembered && [...sel.options].some(o => o.value === remembered)) sel.value = remembered;
    } catch {
      sel.innerHTML = '<option value="none">none</option>' +
                      '<option value="shadowbox_polar">shadowbox_polar</option>' +
                      '<option value="shadowbox_noir">shadowbox_noir</option>';
      const remembered = localStorage.getItem(
        selectId === 'public-matte-select' ? storageKeys.mattePublic : storageKeys.matteUpload
      );
      if (remembered && [...sel.options].some(o => o.value === remembered)) sel.value = remembered;
    }
  }

  document.getElementById('btn-matte-cancel').addEventListener('click', () => {
    closeModal('matte-modal');
  });

  document.getElementById('btn-matte-apply').addEventListener('click', async () => {
    const matteId = document.getElementById('matte-select').value;
    if (!matteId) return;

    const btn = document.getElementById('btn-matte-apply');
    btn.disabled = true;

    try {
      const resp = await fetch('/tv/art/matte', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          content_id: matteContentId,
          matte_id: matteId,
          tv_ip: matteTvIp,
        }),
      });
      if (!resp.ok) throw new Error('Server returned ' + resp.status);
      closeModal('matte-modal');
    } catch (e) {
      alert('Failed to change matte: ' + e.message);
    } finally {
      btn.disabled = false;
    }
  });

  // Close modals on overlay click (but not dialog click)
  modalIds.forEach((modalId) => {
    const modal = document.getElementById(modalId);
    if (!modal) return;
    modal.addEventListener('click', function(e) {
      if (e.target === this) closeModal(modalId);
    });
  });

  function isTypingTarget(el) {
    if (!el) return false;
    const tag = (el.tagName || '').toLowerCase();
    return tag === 'input' || tag === 'textarea' || tag === 'select' || el.isContentEditable;
  }

  // =========================================================================
  // Keyboard shortcuts (Phase 2B)
  // =========================================================================
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      closeAllModals();
      return;
    }

    // Cmd/Ctrl+Enter: generate from prompt
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      const activeTab = getActiveTabName();
      if (activeTab === 'generate') {
        e.preventDefault();
        document.getElementById('btn-generate').click();
      }
      return;
    }

    const typing = isTypingTarget(e.target);

    // Alt+Shift+[G,Y,P,T]: tab jump
    if (e.altKey && e.shiftKey) {
      const key = e.key.toLowerCase();
      if (key === 'g') setActiveTab('generate');
      else if (key === 'y') setActiveTab('gallery');
      else if (key === 'p') setActiveTab('public');
      else if (key === 't') setActiveTab('tvs');
      else return;
      e.preventDefault();
      return;
    }

    if (typing || e.metaKey || e.ctrlKey || e.altKey) return;

    // Slash focuses primary search by active tab.
    if (e.key === '/') {
      const activeTab = getActiveTabName();
      if (activeTab === 'public') {
        e.preventDefault();
        document.getElementById('public-query').focus();
      } else if (activeTab === 'gallery') {
        e.preventDefault();
        document.getElementById('btn-refresh-gallery').focus();
      }
    }
  });

  // =========================================================================
  // Helpers
  // =========================================================================
  function esc(str) {
    const el = document.createElement('span');
    el.textContent = str || '';
    return el.innerHTML;
  }
})();
</script>
</body>
</html>
